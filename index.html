<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Abriendo carpeta...</title>
</head>
<body>
<script>
  var params = new URLSearchParams(window.location.search);
  var ruta = params.get('ruta') || '';

  // Decodificar por si viene codificada
  ruta = decodeURIComponent(ruta);
  
  // Eliminar comillas
  ruta = ruta.replace(/['"]/g, '');
  
  // Normalizar: reemplazar todas las barras / por \
  ruta = ruta.replace(/\//g, '\\');
  
  // Colapsar múltiples barras seguidas en una sola
  ruta = ruta.replace(/\\{2,}/g, '\\');
  
  // Restaurar \\ al inicio para rutas UNC (\\servidor o \\C:)
  if (ruta.charAt(0) === '\\') {
    ruta = '\\' + ruta;
  }
  
  ruta = ruta.trim();

  if (ruta) {
    window.location.href = 'openfolder:' + ruta;
  } else {
    document.write('<h2>Error: no se recibio parametro ruta</h2>');
  }
</script>
</body>
</html>
