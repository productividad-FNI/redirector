<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Abriendo carpeta...</title>
</head>
<body>
<script>
  var params = new URLSearchParams(window.location.search);
  var ruta = params.get('ruta') || '';

  // Solo limpiar comillas y espacios, sin tocar las barras
  ruta = ruta.replace(/['"]/g, '').trim();

  if (ruta) {
    window.location.href = 'openfolder:' + ruta;
  } else {
    document.write('<h2>Error: no se recibio parametro ruta</h2>');
  }
</script>
</body>
</html>
